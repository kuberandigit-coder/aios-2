name: Hourly sales.html snapshot refresh

# Regenerates the 14 live-July snapshot files served by sales.html so every
# member tab shows recent data on load instead of a slow (30-45s) live
# Shopify fetch for every visitor, and instead of staying stuck on whatever
# was last generated (this is what "stuck from yesterday" was — no job was
# actually running to refresh these files). Added 2026-07-24.
#
# node api/scripts/generate-snapshots.js july doesn't hit Shopify/Postgres
# directly — it calls the ALREADY-DEPLOYED site's own API with ?refresh=1
# (auth/credentials handled server-side by Vercel's own env vars) and writes
# the JSON response into api/data/*.json. This job then commits those files
# and redeploys to Vercel so the new snapshots are actually served.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN       - https://vercel.com/account/tokens
#   VERCEL_ORG_ID      - team_3yn5bmAF7peUPYM7LJcj07PF (from .vercel/project.json)
#   VERCEL_PROJECT_ID  - prj_ziowoLxTbIReqBYx1zVweZZBaBDg (from .vercel/project.json)
on:
  schedule:
    - cron: '5 * * * *'   # 5 minutes past every hour, UTC
  workflow_dispatch: {}    # manual "Run workflow" button for testing

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reports/digital-marketing-member-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate July sales snapshots
        env:
          SNAPSHOT_BASE_URL: https://digital-marketing-member-pages.vercel.app
        run: node api/scripts/generate-snapshots.js july

      - name: Regenerate Postgres-backed snapshots (Jefri Req1/Req2, Mahima Req1/Req2)
        env:
          SNAPSHOT_BASE_URL: https://digital-marketing-member-pages.vercel.app
        run: node api/scripts/generate-snapshots.js postgres

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/data/*.json
          git diff --cached --quiet && echo "No snapshot changes" && exit 0
          git commit -m "chore: hourly snapshot refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
